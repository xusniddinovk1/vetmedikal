<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tilni tanlang</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-image: url("/static/images/fon/main_img.jpeg");
        background-repeat: no-repeat;
        background-position: center center;
        background-size: cover;
        height: 100vh;
        overflow: hidden;

        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* Shaffof va blurli oynacha */
      .form-container {
        backdrop-filter: blur(10px);
        background: rgba(255, 255, 255, 0.15);
        border-radius: 25px;
        padding: 40px 60px;
        box-shadow: 0 4px 25px rgba(0, 0, 0, 0.3);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 25px;
      }

      /* Yuqoridagi 2 ta tugma */
      .top-buttons {
        display: flex;
        justify-content: center;
        gap: 15px;
        width: 100%;
      }

      /* Pastdagi tugma markazda turadi */
      .bottom-button {
      margin-top: 20px;
        display: flex;
        justify-content: center;
        width: 100%;
      }

      button {
        background: rgba(255, 255, 255, 0.85);
        border: none;
        color: #dd5506;
        font-weight: 600;
        padding: 15px 35px;
        border-radius: 50px;
        cursor: pointer;
        font-size: 1rem;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(37, 117, 252, 0.4);
      }

      button:hover {
        background: #5a2603;
        color: white;
        box-shadow: 0 6px 20px rgba(37, 117, 252, 0.7);
      }

      @media (max-width: 480px) {
        .top-buttons {
          flex-direction: column;
          align-items: center;
        }

        button {
          width: 80%;
        }

        .form-container {
          padding: 25px 30px;
        }
      }
    </style>
  </head>
  <body>
    <div class="form-container">
      <form method="post">
        {% csrf_token %}
        <div class="top-buttons">
          <button type="submit" name="language" value="uz">O'zbekcha</button>
          <button type="submit" name="language" value="ru">Русский</button>
        </div>

        <div class="bottom-button">
          <button type="submit" name="language" value="en">English</button>
        </div>
      </form>
    </div>
  </body>
</html>
