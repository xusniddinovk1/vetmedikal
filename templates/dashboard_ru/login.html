<!DOCTYPE html>
{% load static %}
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Вход</title>
    <link rel="stylesheet" href="{% static 'dashboard/css/login.css' %}"/>
    <script defer src="{% static 'dashboard/js/login.js' %}"></script>
</head>
<body>
<div class="login-container">
    <div class="login-box">
        <!-- Welcome + Dark mode -->
        <div class="login-header">
            <h2>Добро пожаловать</h2>
            <button class="toggle-theme" id="theme-toggle">🌙</button>
        </div>

        <!-- Error -->
        {% if error %}
        <div class="error-message">
            {{ error }}
        </div>
        {% endif %}

        <!-- ✅ URL moslashtirildi -->
        <form method="post" action="{% url 'ru-admin:vhod_stranitsa' %}">
            {% csrf_token %}

            <input type="text" name="phone_number" placeholder="Номер телефона" required/>

            <div class="password-wrapper">
                <input type="password" name="password" id="password" placeholder="Пароль" required/>
                <button type="button" id="toggle-password" class="password-toggle">👁</button>
            </div>

            <label class="remember-label">
                <input type="checkbox" name="remember_me"/>
                Запомнить меня
            </label>

            <button type="submit">Войти</button>
        </form>
    </div>
</div>
</body>
</html>
